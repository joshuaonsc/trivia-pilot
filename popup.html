<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <style>
        body { width: 230px; font-family: Arial, Helvetica, sans-serif; background: #1f1f1f;
               color: #eee; margin: 0; padding: 14px; }
        h1 { font-size: 16px; color: #00b300; margin: 0 0 6px; }
        #status { font-size: 13px; color: #bbb; margin: 0 0 12px; min-height: 16px; }
        button { display: block; width: 100%; margin: 6px 0 0; padding: 9px 0; border: none;
                 border-radius: 6px; font-size: 14px; cursor: pointer; color: #fff;
                 position: relative; overflow: hidden; }
        .primary { background: #00b300; }
        .primary:hover { background: #00cc00; }
        .secondary { background: #5a5a5a; }
        .secondary:hover { background: #777; }
        .warn { background: #c8860a; }
        .warn:hover { background: #e09a14; }
        .danger { background: #cc3333; }
        .danger:hover { background: #e04444; }

        /* periodic gold shine sweeping across a button while the run is active */
        .sweep::after { content: ""; position: absolute; top: 0; left: 0; width: 50%; height: 100%;
                        background: linear-gradient(120deg, transparent, rgba(255, 220, 120, 0.45), transparent);
                        transform: translateX(-120%); animation: sweep 2.4s linear infinite; }
        @keyframes sweep { to { transform: translateX(320%); } }
    </style>
</head>
<body>
    <h1>TriviaPilot</h1>
    <p id="status">&nbsp;</p>
    <button id="pauseResumeButton" hidden></button>
    <button id="startButton" hidden></button>
    <button id="optionsButton" class="secondary">Options</button>
    <script src="popup.js"></script>
</body>
</html>
